name: Publish Conda Package

on:
  workflow_dispatch:

jobs:
  build-and-upload-conda:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Conda (Miniforge + mamba)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          auto-update-conda: true
          activate-environment: base
          auto-activate-base: true
          channels: conda-forge
          channel-priority: strict
          use-mamba: true

      - name: Install conda build tools
        shell: bash -l {0}
        run: |
          mamba install -y conda-build anaconda-client boa

      - name: Build all Python versions from conda_build_config.yaml
        shell: bash -l {0}
        run: |
          conda mambabuild -c conda-forge --skip-existing conda_recipe/

      - name: Validate Anaconda token
        shell: bash -l {0}
        env:
          ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          test -n "$ANACONDA_TOKEN"
          anaconda --token "$ANACONDA_TOKEN" whoami

      - name: Upload all built packages to Anaconda
        shell: bash -l {0}
        env:
          ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          set -euo pipefail
          while IFS= read -r pkg; do
            anaconda --token "$ANACONDA_TOKEN" upload -u meteocat -l main "$pkg"
          done < <(conda mambabuild -c conda-forge conda_recipe/ --output)
